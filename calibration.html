<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Lightroom Calibration Visualizer</title>

<style>
body{
    font-family:sans-serif;
}
canvas{
    border:1px solid #888;
}
.controls{
    margin-top:10px;
}
label{
    display:block;
}
input[type=range]{
    width:260px;
    margin:4px 0;
}
/* RED */
#rHue::-webkit-slider-runnable-track{
    height:8px;border-radius:4px;
    background:linear-gradient(to right,purple,red,orange);
}
#rSat::-webkit-slider-runnable-track{
    height:8px;border-radius:4px;
    background:linear-gradient(to right,white,red);
}
/* GREEN */
#gHue::-webkit-slider-runnable-track{
    height:8px;border-radius:4px;
    background:linear-gradient(to right,yellow,lime,#00c896);
}
#gSat::-webkit-slider-runnable-track{
    height:8px;border-radius:4px;
    background:linear-gradient(to right,white,lime);
}
/* BLUE */
#bHue::-webkit-slider-runnable-track{
    height:8px;border-radius:4px;
    background:linear-gradient(to right,cyan,blue,magenta);
}
#bSat::-webkit-slider-runnable-track{
    height:8px;border-radius:4px;
    background:linear-gradient(to right,white,blue);
}
/* スライダー */
input[type=range]{
    -webkit-appearance:none;
    appearance:none;
    width:260px;
    margin:4px 0;
}

/* トラック */
input[type=range]::-webkit-slider-runnable-track{
    height:10px;
    border-radius:5px;
}

/* つまみ */
input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;
    appearance:none;
    width:26px;
    height:26px;
    border-radius:50%;
    background:white;
    border:2px solid #555;
    margin-top:-8px;
}

/* Firefox */
input[type=range]::-moz-range-thumb{
    width:26px;
    height:26px;
    border-radius:50%;
    background:white;
    border:2px solid #555;
}
html, body{
    margin:0;
    padding:0;
    overflow:hidden;
    touch-action:none;
}

body{
    padding-bottom:20px;
    box-sizing:border-box;
}
</style>
</head>

<body>

<canvas id="canvas" width="700" height="700"></canvas>

<div class="controls">
<div>
<b>レッド色度座標値</b>
<label>色相 <input type="range" id="rHue" min="-60" max="60" value="0"></label>
<label>彩度 <input type="range" id="rSat" min="50" max="150" value="100"></label>
</div>
<div>
<b>グリーン色度座標値</b>
<label>色相 <input type="range" id="gHue" min="-60" max="60" value="0"></label>
<label>彩度 <input type="range" id="gSat" min="50" max="150" value="100"></label>
</div>
<div>
<b>ブルー色度座標値</b>
<label>色相 <input type="range" id="bHue" min="-60" max="60" value="0"></label>
<label>彩度 <input type="range" id="bSat" min="50" max="150" value="100"></label>
</div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const w = canvas.width;
const h = canvas.height;

const sliders = document.querySelectorAll("input");
sliders.forEach(s=>s.addEventListener("input",draw));

function rotate2D(x,y,a){
    return [x*Math.cos(a)-y*Math.sin(a), x*Math.sin(a)+y*Math.cos(a)];
}

// --- 白補間関数 ---
function mixWhite(rgb,s){
    return [1*(1-s)+rgb[0]*s, 1*(1-s)+rgb[1]*s, 1*(1-s)+rgb[2]*s];
}

// --- 修正版 getPrimaries ---
function getPrimaries(rHueVal, rSatVal, gHueVal, gSatVal, bHueVal, bSatVal){
    const d2r = Math.PI/180;

    // スライダー未指定の場合は現在値を取得
    rHueVal = rHueVal!==undefined ? rHueVal : Number(document.getElementById("rHue").value);
    gHueVal = gHueVal!==undefined ? gHueVal : Number(document.getElementById("gHue").value);
    bHueVal = bHueVal!==undefined ? bHueVal : Number(document.getElementById("bHue").value);

    const rHue = Math.max(-60, Math.min(60, rHueVal)) * d2r;
    const gHue = Math.max(-60, Math.min(60, gHueVal)) * d2r;
    const bHue = Math.max(-60, Math.min(60, bHueVal)) * d2r;

    // 彩度線形変換：50→-0.1, 150→2
    function satMap(s){ return -0.1 + (s-50)*(2+0.1)/100; }

    const rSat = satMap(rSatVal!==undefined?rSatVal:Number(document.getElementById("rSat").value));
    const gSat = satMap(gSatVal!==undefined?gSatVal:Number(document.getElementById("gSat").value));
    const bSat = satMap(bSatVal!==undefined?bSatVal:Number(document.getElementById("bSat").value));

    let R=[0,1], G=[0.866,-0.5], B=[-0.866,-0.5];

    // Hue回転（スライダー値に応じて ±45°）
    R = rotate2D(R[0], R[1], -rHue);
    G = rotate2D(G[0], G[1], -gHue);
    B = rotate2D(B[0], B[1], -bHue);

    // Sat拡大
    R[0]*=rSat; R[1]*=rSat;
    G[0]*=gSat; G[1]*=gSat;
    B[0]*=bSat; B[1]*=bSat;

    // 色相環の外側に突き抜けないよう clamp
    const maxRadius = 1.3;
    function clamp(p){
        let r = Math.hypot(p[0], p[1]);
        if(r>maxRadius){
            p[0] *= maxRadius/r;
            p[1] *= maxRadius/r;
        }
    }

    clamp(R);
    clamp(G);
    clamp(B);

    return {R,G,B};
}

function drawBackground(){
    const img=ctx.createImageData(w,h);
    const data=img.data;
    const cx=w/2, cy=h/2;
    const radius=330;
    for(let y=0;y<h;y++){
        for(let x=0;x<w;x++){
            let dx=x-cx, dy=y-cy;
            let dist=Math.sqrt(dx*dx+dy*dy);
            if(dist>radius) continue;
            let angle=Math.atan2(dy,dx)+Math.PI/2;
            let hue=(angle/(Math.PI*2))*360;
            if(hue<0) hue+=360;
            let sat=dist/radius;
            let rgb=rgbHueWheel(hue);
            rgb=mixWhite(rgb,sat);
            let i=(y*w+x)*4;
            data[i]=rgb[0]*255;
            data[i+1]=rgb[1]*255;
            data[i+2]=rgb[2]*255;
            data[i+3]=255;
        }
    }
    ctx.putImageData(img,0,0);
}

function rgbHueWheel(h){
    h=(h%360+360)%360;
    let r,g,b;
    if(h<60){ r=1; g=h/60; b=0;}
    else if(h<120){ r=1-(h-60)/60; g=1; b=0;}
    else if(h<180){ r=0; g=1; b=(h-120)/60;}
    else if(h<240){ r=0; g=1-(h-180)/60; b=1;}
    else if(h<300){ r=(h-240)/60; g=0; b=1;}
    else{ r=1; g=0; b=1-(h-300)/60;}
    return [r,g,b];
}

function drawTriangle(){

    const scale = 250;
    const cx = w/2;
    const cy = h/2;

    function map(p){
        return [
            cx + p[0]*scale,
            cy - p[1]*scale
        ];
    }

    // --- 元の三角形（初期値固定） ---
    const {R:R0, G:G0, B:B0} = getPrimaries(
        0, 100, // R hue, sat
        0, 100, // G hue, sat
        0, 100  // B hue, sat
    );

    const r0 = map(R0);
    const g0 = map(G0);
    const b0 = map(B0);

    // 元の三角形を点線で描画
    ctx.lineWidth = 3;
    ctx.setLineDash([5,5]);
    ctx.beginPath();
    ctx.moveTo(...r0);
    ctx.lineTo(...g0);
    ctx.lineTo(...b0);
    ctx.closePath();
    ctx.strokeStyle = "white";
    ctx.stroke();
    ctx.setLineDash([]);

    drawPoint(r0, "red");
    drawPoint(g0, "green");
    drawPoint(b0, "blue");

    // --- 移動後の三角形（実線） ---
    const {R, G, B} = getPrimaries();
    const r = map(R);
    const g = map(G);
    const b = map(B);

    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(...r);
    ctx.lineTo(...g);
    ctx.lineTo(...b);
    ctx.closePath();
    ctx.strokeStyle = "white";
    ctx.stroke();

    drawPoint(r, "red");
    drawPoint(g, "green");
    drawPoint(b, "blue");

    // --- 矢印で結ぶ（RGBごとに色を変える） ---
    drawArrow(r0, r, "red");
    drawArrow(g0, g, "green");
    drawArrow(b0, b, "blue");
}
// 矢印描画
function drawArrow(p0, p1, color){
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(...p0);
    ctx.lineTo(...p1);
    ctx.stroke();

    // 矢印の頭
    const headlen = 10; // 矢印サイズ
    const dx = p1[0]-p0[0];
    const dy = p1[1]-p0[1];
    const angle = Math.atan2(dy, dx);
    ctx.beginPath();
    ctx.moveTo(p1[0], p1[1]);
    ctx.lineTo(p1[0]-headlen*Math.cos(angle-Math.PI/6),
               p1[1]-headlen*Math.sin(angle-Math.PI/6));
    ctx.lineTo(p1[0]-headlen*Math.cos(angle+Math.PI/6),
               p1[1]-headlen*Math.sin(angle+Math.PI/6));
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
}


function drawPoint(p,color){
    ctx.beginPath();
    ctx.arc(p[0],p[1],6,0,Math.PI*2);
    ctx.fillStyle=color;
    ctx.fill();
}

function draw(){
    drawBackground();
    drawTriangle();
}

draw();
</script>
</body>

</html>
