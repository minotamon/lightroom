<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>3分割 Grayscale Demo</title>
<style>
html, body{
  margin:0;
  padding:0;
  overflow:hidden; /* スクロール防止 */
  touch-action:none; /* 画面のパン防止 */
  font-family:sans-serif;
  background:#111;
  color:#eee;
}

.wrapper{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

canvas{
  border:1px solid #444;
  width:90vw;           /* 見た目だけ可変 */
  max-width:600px;
  height:auto;
}

.controls{
  width:90vw;
  max-width:600px;
  margin-top:10px;
}

label{display:block;margin:6px 0;}

input[type="range"]{
  width:100%;
  touch-action:pan-x; /* 横操作のみ許可 */
}
</style>
</head>
<body>

<div class="wrapper">
  <!-- 内部解像度は固定（ここ重要） -->
  <canvas id="canvas" width="600" height="120"></canvas>

  <div class="controls">
    <label>ブレンド: <input type="range" id="blend" min="0" max="100" value="50"></label>
    <label>バランス: <input type="range" id="balance" min="-100" max="100" value="0"></label>
  </div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const blendSlider = document.getElementById("blend");
const balanceSlider = document.getElementById("balance");

function smoothstep(edge0, edge1, x) {
  let t = (x - edge0) / (edge1 - edge0);
  t = Math.max(0, Math.min(1, t));
  return t * t * (3 - 2 * t);
}

function clamp01(v){ return Math.max(0, Math.min(1, v)); }

function draw(){
  const w = canvas.width;
  const h = canvas.height;

  const blend = blendSlider.value / 100;
  const balance = balanceSlider.value / 100;

  const img = ctx.createImageData(w, h);

  for(let x=0; x<w; x++){
    let t = x / w;

    let center = 0.5 - balance * 0.25;
    let shadowEnd = center - 0.2;
    let highlightStart = center + 0.2;

    let width = 0.02 + blend * 0.2;

    let shadowW = 1 - smoothstep(shadowEnd - width, shadowEnd + width, t);
    let highlightW = smoothstep(highlightStart - width, highlightStart + width, t);
    let midW = 1 - shadowW - highlightW;

    let value = 0 * shadowW + 0.5 * midW + 1.0 * highlightW;

    for(let y=0; y<h; y++){
      let i = (y*w + x) * 4;
      let v = value * 255;

      img.data[i] = v;
      img.data[i+1] = v;
      img.data[i+2] = v;
      img.data[i+3] = 255;
    }
  }

  ctx.putImageData(img, 0, 0);

  // === ラベル描画（見える状態を維持） ===
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.font = "14px sans-serif";

  function drawText(text, x, y){
    ctx.lineWidth = 3;
    ctx.strokeStyle = "rgba(0,0,0,0.8)";
    ctx.strokeText(text, x, y);

    ctx.fillStyle = "rgba(255,255,255,0.95)";
    ctx.fillText(text, x, y);
  }

  let center = 0.5 - balance * 0.25;
  let shadowEnd = center - 0.2;
  let highlightStart = center + 0.2;

  let shadowX = clamp01(shadowEnd * 0.5) * w;
  let midX = clamp01(center) * w;
  let highlightX = clamp01((1 + highlightStart) * 0.5) * w;

  drawText("シャドウ", shadowX, h / 2);
  drawText("中間調", midX, h / 2);
  drawText("ハイライト", highlightX, h / 2);
}

blendSlider.oninput = draw;
balanceSlider.oninput = draw;

draw();
</script>
</body>
</html>
